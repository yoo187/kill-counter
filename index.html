<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIRSOFT KILL TRACKER ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #00ff41;
            --primary-glow: rgba(0, 255, 65, 0.4);
            --danger: #ff3e3e;
            --danger-glow: rgba(255, 62, 62, 0.4);
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f0f0f0;
        }

        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #app { padding: 25px; max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }

        /* Premium Kill Feed */
        #kill-feed {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            pointer-events: none;
        }
        .kill-notif {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-left: 3px solid var(--primary);
            padding: 12px 20px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 15px;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: eliteSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .kill-notif.is-headshot { border-left-color: var(--danger); box-shadow: 0 0 15px var(--danger-glow); }
        .kill-notif.is-death { border-left-color: #fff; color: var(--danger); }
        .kill-notif img { height: 22px; filter: drop-shadow(0 0 5px #fff); }

        @keyframes eliteSlide { from { transform: translateX(150%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Header & Input */
        header h1 { 
            font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 4px;
            color: var(--primary); text-shadow: 0 0 15px var(--primary-glow);
            text-align: center; margin-bottom: 30px; font-size: 1.4rem;
        }

        #player-name {
            width: 100%; padding: 20px; background: var(--glass); 
            border: 1px solid var(--glass-border); border-radius: 4px;
            color: white; font-family: 'Orbitron', sans-serif; font-size: 1rem;
            text-align: center; margin-bottom: 30px; outline: none;
            transition: 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #player-name:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* Weapon Grid */
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; margin-bottom: 160px;
        }

        .weapon-card, .kill-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 12px; height: 140px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .weapon-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(45, 44, 44, 0.05), transparent);
            transition: 0.5s;
        }
        .weapon-card:hover::before { left: 100%; }
        .weapon-card.selected { 
            border-color: var(--primary); background: rgba(0, 255, 65, 0.08);
            box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-5px);
        }
        .kill-btn:active { transform: scale(0.95); filter: brightness(1.5); }
        .weapon-card img, .kill-btn img { max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); }

        /* Shot Selector */
        #shot-selector { display: flex; gap: 15px; margin-bottom: 25px; }
        .shot-option { flex: 1; position: relative; }
        .shot-option input { display: none; }
        .selector-card {
            padding: 20px; background: var(--glass); text-align: center;
            font-family: 'Orbitron', sans-serif; font-weight: 700; border: 1px solid var(--glass-border);
            border-radius: 8px; transition: 0.3s; letter-spacing: 2px;
        }
        .shot-option input:checked + .selector-card { 
            background: var(--primary); color: #000; border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .shot-option input[value="head"]:checked + .selector-card { 
            background: var(--danger); color: #fff; border-color: var(--danger);
            box-shadow: 0 0 20px var(--danger-glow);
        }

        /* Stats Bar */
        .stat-header { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 15px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; line-height: 1; }

        /* Control Footer */
        footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(5,5,5,0.8); backdrop-filter: blur(20px);
            padding: 25px; box-sizing: border-box; border-top: 1px solid var(--glass-border);
        }
        .primary-btn { 
            width: 100%; padding: 22px; background: var(--primary); color: #000;
            border: none; font-family: 'Orbitron', sans-serif; font-weight: 900;
            border-radius: 8px; letter-spacing: 3px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 20px var(--primary-glow);
        }
        .primary-btn:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; }
        
        .death-btn { 
            width: 100%; padding: 18px; background: transparent; color: var(--danger);
            border: 2px solid var(--danger); font-family: 'Orbitron', sans-serif; font-weight: 800;
            border-radius: 8px; margin-bottom: 15px; transition: 0.3s;
        }
        .death-btn:active { background: var(--danger); color: white; }
        .secondary-btn { 
            width: 100%; background: none; border: none; color: #666; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px; padding: 10px; cursor: pointer;
        }

        /* Mission Summary Card */
        .stat-line { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--glass); border: 1px solid var(--glass-border);
            margin-bottom: 10px; border-radius: 8px; font-family: 'Orbitron', sans-serif;
        }
        .stat-label { color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="kill-feed"></div>

    <div id="app">
        <!-- SETUP SCREEN -->
        <section id="setup-screen">
            <header>
                <h1>SYSTEM BOOT</h1>
                <input type="text" id="player-name" placeholder="IDENTIFY OPERATOR..." maxlength="15">
            </header>
            <div id="weapon-selection-grid" class="grid"></div>
            <footer>
                <button id="start-game-btn" class="primary-btn" disabled>ENGAGE MISSION</button>
            </footer>
        </section>

        <!-- ACTIVE HUD -->
        <section id="game-screen" class="hidden">
            <div class="stat-header">
                <div style="display: flex; gap: 25px;">
                    <div>
                        <span style="display:block; font-size: 0.7rem; color: var(--primary); font-weight:bold; letter-spacing:1px;">KILLS</span>
                        <span id="kill-count" class="stat-value" style="color: var(--primary);">0</span>
                    </div>
                    <div style="border-left: 1px solid #333; padding-left: 20px;">
                        <span style="display:block; font-size: 0.7rem; color: var(--danger); font-weight:bold; letter-spacing:1px;">DEATHS</span>
                        <span id="death-count" class="stat-value" style="color: var(--danger);">0</span>
                    </div>
                </div>
                <div style="text-align: right;">
                    <span id="display-name" style="font-family:'Orbitron'; font-weight: bold; color: #fff;">OPERATOR</span>
                    <div style="font-size: 0.6rem; color: var(--primary); margin-top:5px; animation: pulse 2s infinite;">● HUD ACTIVE</div>
                </div>
            </div>

            <div id="shot-selector">
                <label class="shot-option">
                    <input type="radio" name="shot-type" value="body" checked>
                    <div class="selector-card">BODY</div>
                </label>
                <label class="shot-option">
                    <input type="radio" name="shot-type" value="head">
                    <div class="selector-card">HEAD</div>
                </label>
            </div>

            <div id="active-weapons" class="grid"></div>

            <footer>
                <button id="add-death-btn" class="death-btn">REPORT CASUALTY (+1)</button>
                <button id="end-game-btn" class="secondary-btn">ABORT MISSION</button>
            </footer>
        </section>

        <!-- MISSION SUMMARY -->
        <section id="result-screen" class="hidden">
            <header><h1>DEBRIEFING</h1></header>
            <div id="stats-output"></div>
            <br>
            <button onclick="resetApp()" class="primary-btn">NEW ASSIGNMENT</button>
        </section>
    </div>

    <script>
        const weaponDatabase = [
            { id: 1, img: "50 Gun SVG_1.png" }, { id: 2, img: "50 Gun SVG_2.png" },
            { id: 3, img: "50 Gun SVG_3.png" }, { id: 4, img: "50 Gun SVG_4.png" },
            { id: 5, img: "50 Gun SVG_5.png" }, { id: 6, img: "50 Gun SVG_6.png" },
            { id: 7, img: "50 Gun SVG_7.png" }, { id: 8, img: "50 Gun SVG_8.png" },
            { id: 9, img: "50 Gun SVG_9.png" }, { id: 10, img: "50 Gun SVG_10.png" },
            { id: 11, img: "50 Gun SVG_11.png" }, { id: 12, img: "50 Gun SVG_12.png" },
            { id: 13, img: "50 Gun SVG_13.png" }, { id: 14, img: "50 Gun SVG_14.png" },
            { id: 15, img: "50 Gun SVG_15.png" }, { id: 16, img: "50 Gun SVG_16.png" },
            { id: 17, img: "50 Gun SVG_17.png" }, { id: 18, img: "50 Gun SVG_18.png" },
            { id: 19, img: "50 Gun SVG_19.png" }, { id: 20, img: "50 Gun SVG_20.png" },
            { id: 21, img: "50 Gun SVG_21.png" }, { id: 22, img: "50 Gun SVG_22.png" },
            { id: 23, img: "50 Gun SVG_23.png" }, { id: 24, img: "50 Gun SVG_24.png" },
            { id: 25, img: "50 Gun SVG_25.png" }, { id: 26, img: "50 Gun SVG_26.png" },
            { id: 27, img: "50 Gun SVG_27.png" }, { id: 28, img: "50 Gun SVG_28.png" },
            { id: 29, img: "50 Gun SVG_29.png" }, { id: 30, img: "50 Gun SVG_30.png" },
            { id: 31, img: "50 Gun SVG_31.png" }, { id: 32, img: "50 Gun SVG_32.png" },
            { id: 33, img: "50 Gun SVG_33.png" }, { id: 34, img: "50 Gun SVG_34.png" },
            { id: 35, img: "50 Gun SVG_35.png" }, { id: 36, img: "50 Gun SVG_36.png" },
            { id: 37, img: "50 Gun SVG_37.png" }, { id: 38, img: "50 Gun SVG_38.png" },
            { id: 39, img: "50 Gun SVG_39.png" }, { id: 40, img: "50 Gun SVG_40.png" },
            { id: 41, img: "50 Gun SVG_41.png" }, { id: 42, img: "50 Gun SVG_42.png" },
            { id: 43, img: "50 Gun SVG_43.png" }, { id: 44, img: "50 Gun SVG_44.png" },
            { id: 45, img: "50 Gun SVG_45.png" }, { id: 46, img: "50 Gun SVG_46.png" },
            { id: 47, img: "50 Gun SVG_47.png" }, { id: 48, img: "50 Gun SVG_48.png" },
            { id: 49, img: "50 Gun SVG_49.png" }, { id: 50, img: "50 Gun SVG_50.png" },
            { id: 51, img: "1_001.png" }, { id: 52, img: "10_001.png" },
            { id: 53, img: "20_001.png" }, { id: 54, img: "23_001.png" },
            { id: 55, img: "30_001.png" }, { id: 56, img: "31_001.png" },
            { id: 57, img: "32_001.png" }, { id: 58, img: "35_001.png" },
            { id: 59, img: "38_001.png" }, { id: 60, img: "43_001.png" },
            { id: 61, img: "slice1@3x.png" }, { id: 62, img: "slice5@3x.png" },
            { id: 63, img: "slice9@3x.png" }, { id: 64, img: "slice10@3x.png" },
            { id: 65, img: "slice15@3x.png" }, { id: 66, img: "slice23@3x.png" },
            { id: 67, img: "slice28@3x.png" }, { id: 68, img: "slice31@3x.png" },
            { id: 69, img: "slice35@3x.png" }, { id: 70, img: "slice36@3x.png" }
        ];

        let state = { playerName: "", selectedWeaponIds: [], kills: [], deaths: 0, inGame: false };

        function init() {
            renderLobby();
            loadFromStorage();
            document.getElementById('start-game-btn').onclick = startMission;
            document.getElementById('end-game-btn').onclick = endMission;
            document.getElementById('add-death-btn').onclick = registerDeath;
            document.getElementById('player-name').oninput = (e) => { state.playerName = e.target.value; saveToStorage(); };
        }

        function renderLobby() {
            const grid = document.getElementById('weapon-selection-grid');
            grid.innerHTML = '';
            weaponDatabase.forEach(wep => {
                const card = document.createElement('div');
                card.className = `weapon-card ${state.selectedWeaponIds.includes(wep.id) ? 'selected' : ''}`;
                card.innerHTML = `<img src="IMG/${wep.img}" onerror="this.src='https://via.placeholder.com/120x60?text=GUN'">`;
                card.onclick = () => { toggleWeapon(wep.id, card); playSound(70); };
                grid.appendChild(card);
            });
        }

        function toggleWeapon(id, el) {
            const index = state.selectedWeaponIds.indexOf(id);
            if (index > -1) { state.selectedWeaponIds.splice(index, 1); el.classList.remove('selected'); }
            else { state.selectedWeaponIds.push(id); el.classList.add('selected'); }
            document.getElementById('start-game-btn').disabled = state.selectedWeaponIds.length === 0;
            saveToStorage();
        }

        function startMission() {
            state.inGame = true;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = state.playerName || "OPERATOR";
            document.getElementById('kill-count').innerText = state.kills.length;
            document.getElementById('death-count').innerText = state.deaths;
            renderGameWeapons();
            saveToStorage();
            playSound(100);
        }

        function renderGameWeapons() {
            const grid = document.getElementById('active-weapons');
            grid.innerHTML = '';
            weaponDatabase.filter(w => state.selectedWeaponIds.includes(w.id)).forEach(wep => {
                const btn = document.createElement('div');
                btn.className = 'kill-btn';
                btn.innerHTML = `<img src="IMG/${wep.img}">`;
                btn.onclick = () => registerKill(wep);
                grid.appendChild(btn);
            });
        }

        function registerKill(weapon) {
            const type = document.querySelector('input[name="shot-type"]:checked').value;
            state.kills.push({ weapon: weapon.img, type: type, time: new Date().toLocaleTimeString() });
            document.getElementById('kill-count').innerText = state.kills.length;
            showKillFeed(weapon, type, false);
            type === 'head' ? hapticFeedback([80, 50, 80]) : hapticFeedback(40);
            saveToStorage();
        }

        function registerDeath() {
            state.deaths++;
            document.getElementById('death-count').innerText = state.deaths;
            showKillFeed(null, null, true);
            hapticFeedback([200, 100, 200]);
            saveToStorage();
        }

        function showKillFeed(weapon, type, isDeath) {
            const feed = document.getElementById('kill-feed');
            const div = document.createElement('div');
            if (isDeath) {
                div.className = 'kill-notif is-death';
                div.innerHTML = `<span>MAN DOWN</span> 💀 <span>${state.playerName || 'OPERATOR'}</span>`;
            } else {
                div.className = `kill-notif ${type === 'head' ? 'is-headshot' : ''}`;
                div.innerHTML = `<span>${state.playerName || 'OPERATOR'}</span> <img src="IMG/${weapon.img}"> <span>TARGET</span> ${type === 'head' ? '<span>[HEADSHOT]</span>' : ''}`;
            }
            feed.prepend(div);
            setTimeout(() => { div.style.opacity = '0'; div.style.transform = 'translateX(20px)'; setTimeout(() => div.remove(), 500); }, 3000);
        }

        function endMission() {
            state.inGame = false;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const headshots = state.kills.filter(k => k.type === 'head').length;
            const kd = state.deaths === 0 ? state.kills.length : (state.kills.length / state.deaths).toFixed(2);
            
            document.getElementById('stats-output').innerHTML = `
                <div class="stat-line"><span class="stat-label">TOTAL ELIMINATIONS</span> <span style="color:var(--primary); font-weight:900;">${state.kills.length}</span></div>
                <div class="stat-line"><span class="stat-label">OPERATOR DEATHS</span> <span style="color:var(--danger); font-weight:900;">${state.deaths}</span></div>
                <div class="stat-line"><span class="stat-label">PERFORMANCE (K/D)</span> <span style="color:#fff; font-weight:900;">${kd}</span></div>
                <div class="stat-line"><span class="stat-label">PRECISION (HS)</span> <span style="color:var(--danger); font-weight:900;">${headshots}</span></div>
            `;
            saveToStorage();
        }

        function hapticFeedback(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }
        function playSound(pitch) { /* Toekomstige integratie voor audio triggers */ }
        function saveToStorage() { localStorage.setItem('airsoft_elite_v4', JSON.stringify(state)); }
        function loadFromStorage() {
            const saved = localStorage.getItem('airsoft_elite_v4');
            if (saved) {
                state = JSON.parse(saved);
                document.getElementById('player-name').value = state.playerName || "";
                document.getElementById('start-game-btn').disabled = state.selectedWeaponIds.length === 0;
                if (state.inGame) startMission(); else renderLobby();
            }
        }
        function resetApp() { if(confirm("ABORT MISSION AND CLEAR DATA?")) { localStorage.removeItem('airsoft_elite_v4'); location.reload(); } }

        init();
    </script>
</body>
</html>
